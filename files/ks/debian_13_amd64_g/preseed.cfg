#_preseed_V1

#### Contents of the preconfiguration file (Debian 13 / Trixie - Graphics)
### Splash
d-i debian-installer/splash boolean false

### Localization
# FIX: removed duplicate locale line (was set twice, once as UTF8 without hyphen)
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string NO
# Optionally specify additional locales to be generated.
d-i localechooser/supported-locales multiselect en_US.UTF-8, no_NO.UTF-8

# Keyboard selection.
d-i keyboard-configuration/xkb-keymap       select no
d-i console-keymaps-at/keymap               select no
d-i keyboard-configuration/layout           select Norwegian
d-i keyboard-configuration/variant          select Norwegian

### Console
d-i console-setup/ask_detect boolean false
d-i console-setup/layoutcode string no
# d-i console-setup/variantcode string

### Network configuration
d-i netcfg/choose_interface select auto
# d-i netcfg/get_nameservers string 8.8.8.8 8.8.4.4
d-i netcfg/get_nameservers      string 1.1.1.1 1.0.0.1

d-i netcfg/get_hostname string debian13-graphics
d-i netcfg/get_domain seen true

# Disable that annoying WEP key dialog.
d-i netcfg/wireless_wep string

### Mirror settings
d-i mirror/country string no
# FIX: updated from httpredir.debian.org (legacy redirect) to deb.debian.org (current CDN)
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account setup
d-i passwd/root-login boolean true
d-i passwd/make-user boolean true

### create a password with `printf "yourpassword" | mkpasswd -s -m sha-512`
# d-i passwd/root-password-crypted password [hash]
d-i passwd/root-password password porcodio
d-i passwd/root-password-again password porcodio
d-i passwd/user-fullname string Debian User
d-i passwd/username string sub
d-i passwd/user-password password porcodio
d-i passwd/user-password-again password porcodio
d-i passwd/user-default-groups string audio cdrom video sudo

### Clock and time zone setup
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Berlin
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string 0.debian.pool.ntp.org

### Partitioning
# Graphics variant uses crypto (LVM on encrypted partition)
d-i partman-auto/method string crypto
d-i partman-auto-crypto/erase_disks boolean false
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i debian-installer/add-kernel-opts string console=ttyS0

### Apt setup
# NOTE: Debian 13 splits non-free firmware into its own component.
# Required for graphics drivers and hardware to work out of the box.
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

### Package selection
# NOTE: yaru-theme-* packages are Ubuntu-origin themes that are available in
# Debian repos but may lag behind. If they cause install failures, remove them
# and substitute with adwaita-qt or another theme package.
d-i pkgsel/include vim sudo \
  gnome-session-flashback gdm3 gnome-terminal \
  yaru-theme-gnome-shell yaru-theme-icon yaru-theme-gtk \
  openssh-server xdg-utils fonts-noto-color-emoji firefox-esr

# Do safe-upgrade packages after debootstrap.
d-i pkgsel/upgrade select safe-upgrade

d-i pkgsel/run_tasksel boolean false
d-i pkgsel/install-recommends boolean false
d-i pkgsel/include/install-recommends boolean false
pkgsel pkgsel/include/install-recommends boolean false

popularity-contest popularity-contest/participate boolean false

### Boot loader installation
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Finishing up the installation
d-i finish-install/keep-consoles boolean true
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean false

# Power off the VM after install (consistent with other preseeds)
d-i debian-installer/exit/poweroff boolean true

